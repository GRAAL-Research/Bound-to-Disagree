name: sweep
method: grid
metric:
  goal: minimize
  name: kl_bound
  
parameters:
  seed:
    values: [1, 2, 3, 4, 42]
  # pretraining details
  prior_size:
    value: 0.0
  pretraining_epochs:
    value: None
  pretraining_lr:
    value: None

  # training details
  model_type:
    value : "cnn"
  dropout_probability:
    values: [0.2, 0.5]

  # optimizer
  optimizer:
    values: ["Adam", "adamfree", 'cocob']
  training_lr:
    values: [1e-3, 1e-4]
  momentum:
    value: None
  nesterov:
    value: None
  weight_decay:
    values : [0.1, 0.01, 0.001]

  # p2l params
  max_compression_size:
    value: 20000
  data_groupsize: 
    value: 1
  patience:
    value: 3
  min_probability:
    value: None
  clamp_method:
    value: None
  clamping:
    value: False