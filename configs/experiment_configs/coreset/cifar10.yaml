name: sweep
method: grid
metric:
  goal: minimize
  name: kl_bound
  
parameters:
  seed:
    values: [1, 2, 3, 4, 42]
  # pretraining details
  prior_size:
    value: 0.0
  pretraining_epochs:
    value: None
  pretraining_lr:
    value: None

  # training details
  model_type:
    value: "resnet"
  dropout_probability:
    value: 0.5
  selection_epochs:
    value: 40
  selection:
    values: ['Uniform', 'kCenterGreedy','Forgetting', 'DeepFool']
  fraction:
    values: [0.1, 0.15,0.2, 0.3, 0.4, 0.5] #[0.001, 0.005, 0.01, 0.05, 0.1, 0.15,0.2, 0.3, 0.4, 0.5]
  submodular:
    value: "GraphCut"
  submodular_greedy:
    value: "LazyGreedy"
  uncertainty:
    value: "Margin"

  # optimizer
  optimizer:
    values: ["SGD", "sgdfree"]
  lr_scheduler:
    value: "onecycle"
  training_lr:
    values: [0.01, 0.05]
  momentum:
    value: 0.9
  nesterov:
    value: None
  weight_decay:
    value : 5e-4

  # p2l params
  max_compression_size:
    value: 20000
  data_groupsize: 
    value: 128
  patience:
    value: 20
  min_probability:
    # values: [1e-3, 1e-4]
    values: [0.1, 0.5, 1, 1.5, 2, 4, 5]
  clamp_method:
    # values: ["clamp", "smooth"]
    value: "clip"
  clamping:
    value: True